# HostGuard AI - Cloudflare Workers Configuration
name = "hostguard-ai"
compatibility_date = "2024-01-01"
node_compat = false

[env.production]
name = "hostguard-ai-prod"

[[observability.logs]]
enabled = true
destination = "null"

[ai]
binding = "AI_GATEWAY"

[[d1_databases]]
binding = "DB"
database_name = "hostguard"
database_id = "" # Set via wrangler secrets

[[ratelimits]]
binding = "RATE_LIMIT"
namespace_id = "" # Set via wrangler secrets

[[kv_namespaces]]
binding = "CACHE"
id = "" # Set via wrangler secrets

# HostGuard AI - Cloudflare Workers Configuration
name = "hostguard-ai"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "src/backend/src/index.ts"

[durable_objects]
bindings = [
  { name = "MonitorAgent", class_name = "MonitorAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MonitorAgent"]

[env.production]
name = "hostguard-ai-prod"

[[env.production.durable_objects.bindings]]
name = "MonitorAgent"
class_name = "MonitorAgent"

[env.production.ai]
binding = "AI_GATEWAY"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "e24e87f45e2d4b1e9dce03fa98966ccd"
preview_id = "e24e87f45e2d4b1e9dce03fa98966ccd"

[observability]
enabled = true

# Cron Trigger — периодический мониторинг каждые 30 минут
[[triggers]]
crons = ["*/30 * * * *"]

# =============================================================================
# Secrets (set via `npx wrangler secret put`):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
#   ROUTERAI_API_KEY, OPENROUTER_API_KEY
#   ROUTERAI_BASE_URL, AI_GATEWAY_BASE_URL, DEEPSEEK_MODEL
#   UPSTASH_REDIS_URL, UPSTASH_REDIS_TOKEN
#   TAVILY_API_KEY
#   TELEGRAM_BOT_TOKEN, OWNER_TELEGRAM_ID
#   SENTRY_DSN, SENTRY_ENVIRONMENT, SENTRY_RELEASE
# =============================================================================
